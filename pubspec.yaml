name: ilac_dolabi
description: Ev ilaç envanteri - karekod okuyucu
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: 7.2.0              # karekod / DataMatrix okuma
  image_picker: 1.1.2                # yedek: fotoğraf çekerek okuma
  shared_preferences: ^2.3.2         # ilaçları telefonda saklama
  flutter_local_notifications: 21.0.0 # son kullanma hatırlatmaları
  timezone: ^0.11.0                  # bildirim zamanlaması

flutter:
  uses-material-design: true
  assets:
    - assets/ilaclar.csv
